kind = "web"
previewPath = "/"
title = "Dowry.Africa"
version = "1.0.0"
id = "artifacts/dowry-africa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18185

[services.development]
run = "pnpm --filter @workspace/dowry-africa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dowry-africa", "run", "build" ]
publicDir = "artifacts/dowry-africa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18185"
BASE_PATH = "/"
